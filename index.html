<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>振动计数器</title>
<!-- NoSleep.js：用隐藏循环静音 video 元素阻止 iOS / watchOS 自动锁屏。
     watchOS WebKit 是否生效未知，能加载就用，加载失败也不影响计数。 -->
<script src="https://cdn.jsdelivr.net/npm/nosleep.js@0.12.2/dist/NoSleep.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
:root{--bg:#06090f;--s:#0d1117;--s2:#161b22;--bd:#21262d;--bb:#30363d;--ac:#00e5a0;--ac2:#58a6ff;--ac3:#f0883e;--tx:#e6edf3;--td:#7d8590;--tm:#484f58}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--tx);font-family:'Noto Sans SC',-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}

/* Header */
.hd{background:rgba(6,9,15,0.88);border-bottom:1px solid var(--bd);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
.logo{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:var(--ac);letter-spacing:2px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.logo-dot{width:7px;height:7px;background:var(--ac);border-radius:50%;animation:pulse 2.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.badge{font-family:'JetBrains Mono',monospace;background:var(--ac);color:#000;font-size:12px;font-weight:700;padding:4px 14px;border-radius:100px;min-width:48px;text-align:center;transition:transform .1s}
.badge.pop{transform:scale(1.25)}

main{padding:0 0 24px}

/* 主计数卡片 */
.count-card{margin:14px 14px 10px;background:var(--s);border:1px solid rgba(0,229,160,.3);border-radius:14px;overflow:hidden;box-shadow:0 0 40px rgba(0,229,160,.04)}
.count-header{background:linear-gradient(135deg,rgba(0,229,160,.07),rgba(88,166,255,.07));padding:10px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bd)}
.count-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ac);letter-spacing:1.5px;text-transform:uppercase}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--bb);transition:background .3s,box-shadow .3s}
.status-dot.active{background:var(--ac);box-shadow:0 0 8px rgba(0,229,160,.6);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.5}}

.count-num{font-family:'JetBrains Mono',monospace;font-size:88px;font-weight:700;color:var(--ac);text-align:center;padding:24px 0 4px;line-height:1;text-shadow:0 0 60px rgba(0,229,160,.12);transition:color .1s,transform .15s;cursor:pointer;user-select:none;-webkit-user-select:none}
.count-num:active{transform:scale(.93)}
.count-num.flash{color:#fff;text-shadow:0 0 60px rgba(255,255,255,.4)}
.count-tap-hint{font-size:10px;color:var(--tm);text-align:center;font-family:'JetBrains Mono',monospace;letter-spacing:1px;padding-bottom:2px;transition:opacity .3s}
.count-tap-hint.hidden{opacity:0}

.count-sub{font-size:11px;color:var(--td);text-align:center;padding-bottom:4px;font-family:'JetBrains Mono',monospace}

/* 快速计算按钮 */
.qcalc{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:8px 14px 12px}
.qc-item{display:flex;flex-direction:column;gap:4px;min-width:0}
.qc-btn{background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:9px 4px;color:var(--td);font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;text-align:center;transition:color .15s,border-color .15s,background .15s,transform .1s;line-height:1.1;cursor:pointer;user-select:none;-webkit-user-select:none}
.qc-btn:active{transform:scale(.96)}
.qc-btn.active{color:var(--ac);border-color:rgba(0,229,160,.35);background:rgba(0,229,160,.06)}
.qc-result{text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--ac);min-height:16px;line-height:1}

/* 加速度实时条 */
.accel-bar-wrap{padding:12px 14px 14px;border-top:1px solid var(--bd)}
.accel-bar-label{font-size:10px;color:var(--td);font-family:'JetBrains Mono',monospace;display:flex;justify-content:space-between;margin-bottom:6px}
.accel-bar-label span{color:var(--ac)}
.accel-track{height:4px;background:var(--bd);border-radius:2px;overflow:hidden;position:relative}
.accel-fill{height:100%;background:linear-gradient(90deg,var(--ac),var(--ac2));border-radius:2px;width:0%;transition:width .1s}
.threshold-line{position:absolute;top:0;height:100%;width:2px;background:var(--ac3);opacity:.8}

/* 统计格 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--bd);border-top:1px solid var(--bd)}
.stat-cell{background:var(--s);padding:10px 14px;text-align:center}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;color:var(--tx)}
.stat-key{font-size:10px;color:var(--td);margin-top:2px}

/* 设置折叠区 */
.sec{margin:0 14px 10px;background:var(--s);border:1px solid var(--bd);border-radius:12px;overflow:hidden}
.sh{padding:11px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;background:var(--s2);user-select:none}
.st{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--td);letter-spacing:.8px;display:flex;align-items:center;gap:8px;text-transform:uppercase}
.st .d{width:5px;height:5px;border-radius:50%}
.ch{color:var(--tm);transition:transform .25s;font-size:10px}.ch.open{transform:rotate(180deg)}
.sb{padding:14px;display:none}.sb.open{display:block}
.pr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px}.pr:last-child{margin-bottom:0}
.pl{font-size:12px;color:var(--td);flex:1;line-height:1.4}
.pl strong{display:block;color:var(--tx);font-size:13px;font-weight:500;margin-bottom:1px}
.pc{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pv{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ac);min-width:42px;text-align:right}
input[type="range"]{-webkit-appearance:none;width:110px;height:3px;background:var(--bb);border-radius:2px;outline:none}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;background:var(--ac);border-radius:50%;cursor:pointer}

/* iOS 权限区 */
.perm-box{margin:0 14px 10px;background:var(--s);border:1px dashed var(--bb);border-radius:12px;padding:18px 16px;text-align:center;display:none}
.perm-box.show{display:block}
.perm-icon{font-size:28px;margin-bottom:8px}
.perm-txt{font-size:12px;color:var(--td);line-height:1.7;margin-bottom:12px}
.perm-btn{padding:10px 24px;background:var(--ac2);border:none;border-radius:8px;color:#000;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.5px}

</style>
</head>
<body>
<header class="hd">
  <div class="logo"><div class="logo-dot"></div>Vibration·Counter</div>
  <div class="badge" id="topBadge">0</div>
</header>

<main>
  <!-- iOS 权限提示 -->
  <div class="perm-box" id="permBox">
    <div class="perm-icon">📱</div>
    <div class="perm-txt">iOS 设备需要授权访问<br>运动传感器才能检测振动</div>
    <button class="perm-btn" onclick="requestPerm()">授权传感器</button>
  </div>

  <!-- 主计数卡片 -->
  <div class="count-card">
    <div class="count-header">
      <span class="count-label">▸ Vibration Count</span>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="count-num" id="countNum" onclick="tapCount()">0</div>
    <div class="count-tap-hint" id="tapHint">点击开始检测</div>
    <div class="count-sub" id="countSub">等待启动...</div>

    <!-- 快速计算 -->
    <div class="qcalc" id="qcalc">
      <div class="qc-item">
        <button type="button" class="qc-btn" data-mul="2" onclick="toggleQc(this)">×2</button>
        <div class="qc-result"></div>
      </div>
      <div class="qc-item">
        <button type="button" class="qc-btn" data-mul="4" onclick="toggleQc(this)">×4</button>
        <div class="qc-result"></div>
      </div>
      <div class="qc-item">
        <button type="button" class="qc-btn" data-mul="8" onclick="toggleQc(this)">×8</button>
        <div class="qc-result"></div>
      </div>
      <div class="qc-item">
        <button type="button" class="qc-btn" data-mul="63.6" onclick="toggleQc(this)">×63.6</button>
        <div class="qc-result"></div>
      </div>
    </div>

    <!-- 实时加速度条 -->
    <div class="accel-bar-wrap">
      <div class="accel-bar-label">
        <span>加速度</span>
        <span id="accelVal">0.00 m/s²</span>
      </div>
      <div class="accel-track">
        <div class="accel-fill" id="accelFill"></div>
        <div class="threshold-line" id="thresholdLine" style="left:50%"></div>
      </div>
    </div>

    <!-- 统计 -->
    <div class="stat-grid">
      <div class="stat-cell"><div class="stat-val" id="statMax">0.0</div><div class="stat-key">峰值 m/s²</div></div>
      <div class="stat-cell"><div class="stat-val" id="statRate">-</div><div class="stat-key">次/分钟</div></div>
      <div class="stat-cell"><div class="stat-val" id="statTime">00:00</div><div class="stat-key">计时</div></div>
    </div>
  </div>

  <!-- 设置 -->
  <div class="sec">
    <div class="sh" onclick="toggleSec('cfg')">
      <span class="st"><span class="d" style="background:var(--ac2)"></span>灵敏度设置</span>
      <span class="ch open" id="cfgCh">▾</span>
    </div>
    <div class="sb open" id="cfg">
      <div class="pr">
        <div class="pl">
          <strong>灵敏度</strong>
          低=需要大动作 / 高=轻微振动即触发
        </div>
        <div class="pc">
          <input type="range" min="1" max="10" value="10" id="sensSlider" oninput="onSensChange(this.value)">
          <span class="pv" id="sensVal">10</span>
        </div>
      </div>
      <div class="pr">
        <div class="pl">
          <strong>冷却时间</strong>
          同一次振动不重复计数的间隔
        </div>
        <div class="pc">
          <input type="range" min="100" max="1000" step="10" value="190" id="coolSlider" oninput="onCoolChange(this.value)">
          <span class="pv" id="coolVal">190ms</span>
        </div>
      </div>
      <div class="pr" style="margin-top:4px">
        <div class="pl"><strong>当前阈值</strong>超过此加速度才计数</div>
        <div class="pc"><span class="pv" id="threshDisp">10.0 m/s²</span></div>
      </div>
    </div>
  </div>
</main>

<script>
// ── 状态 ──────────────────────────────────────────
let running = false;
let count = 0;
let maxAccel = 0;
let lastTrigger = 0;
let startTime = null;
let timerInterval = null;
let cooldown = 190;   // ms
let sensitivity = 10; // 1~10
let threshold = 2.0;  // m/s²，由 sensitivity 映射
let lastMotionTime = 0;       // 最近一次 devicemotion 时间戳
let stallWatchInterval = null; // 心跳看门狗：事件流挂起时自动重订阅
const STALL_MS = 3000;         // 超过这个时间没事件就认为挂起

// sensitivity → threshold 映射（1=20, 10=2）
function sensToThreshold(s) {
  return 22 - s * 2;
}

// ── UI 工具 ───────────────────────────────────────
function toggleSec(id) {
  document.getElementById(id).classList.toggle('open');
  document.getElementById(id + 'Ch').classList.toggle('open');
}

function onSensChange(v) {
  sensitivity = parseInt(v);
  threshold = sensToThreshold(sensitivity);
  document.getElementById('sensVal').textContent = v;
  document.getElementById('threshDisp').textContent = threshold.toFixed(1) + ' m/s²';
  updateThresholdLine();
}

function onCoolChange(v) {
  cooldown = parseInt(v);
  document.getElementById('coolVal').textContent = v + 'ms';
}

function updateThresholdLine() {
  // 条宽对应 0~30 m/s²，threshold线位置
  const pct = Math.min((threshold / 30) * 100, 100);
  document.getElementById('thresholdLine').style.left = pct + '%';
}

function resetCount() {
  count = 0;
  maxAccel = 0;
  startTime = running ? Date.now() : null;
  // 归零同时恢复所有快算按钮为默认态：取消激活、清空结果
  document.querySelectorAll('.qc-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.qc-result').forEach(r => r.textContent = '');
  updateCountUI(false);
  document.getElementById('statMax').textContent = '0.0';
  document.getElementById('statRate').textContent = '-';
  document.getElementById('statTime').textContent = '00:00';
}

function updateCountUI(flash) {
  const el = document.getElementById('countNum');
  el.textContent = count;
  document.getElementById('topBadge').textContent = count;
  if (flash) {
    el.classList.add('flash');
    const badge = document.getElementById('topBadge');
    badge.classList.add('pop');
    setTimeout(() => { el.classList.remove('flash'); badge.classList.remove('pop'); }, 150);
  }
}

// 快算按钮：每次点击捕获当前 count × 系数的快照，
// 后续计数不再自动刷新，直到再次点击该按钮重新取值。
function toggleQc(btn) {
  btn.classList.add('active');
  const res = btn.closest('.qc-item').querySelector('.qc-result');
  const mul = parseFloat(btn.dataset.mul);
  const r = count * mul;
  res.textContent = Number.isInteger(r) ? r : r.toFixed(1);
}

function setStatus(active) {
  const dot = document.getElementById('statusDot');
  const sub = document.getElementById('countSub');
  const hint = document.getElementById('tapHint');
  if (active) {
    dot.classList.add('active');
    sub.textContent = '检测中，等待振动...';
    hint.textContent = '点击数字归零';
    hint.classList.remove('hidden');
  } else {
    dot.classList.remove('active');
    sub.textContent = count > 0 ? `已记录 ${count} 次振动` : '等待启动...';
    hint.textContent = '点击数字开始检测';
    hint.classList.remove('hidden');
  }
}

function updateTimer() {
  if (!startTime) return;
  const sec = Math.floor((Date.now() - startTime) / 1000);
  const m = String(Math.floor(sec / 60)).padStart(2, '0');
  const s = String(sec % 60).padStart(2, '0');
  document.getElementById('statTime').textContent = m + ':' + s;
  // 次/分钟
  const mins = (Date.now() - startTime) / 60000;
  const rate = mins > 0 ? (count / mins).toFixed(1) : '-';
  document.getElementById('statRate').textContent = rate;
}

// ── 传感器处理 ────────────────────────────────────
// devicemotion 在手机上可达 60Hz+，每次都直接改 DOM 会把主线程填满，
// 表现为点击屏幕延迟/无反应。把纯视觉更新合并到 rAF 每帧一次，
// 计数触发逻辑保持在事件回调里实时判断。
let rafPending = false;
let rafId = 0;
let latestMag = 0;
let maxAccelDirty = false;

function flushMotionUI() {
  rafPending = false;
  rafId = 0;
  const pct = Math.min((latestMag / 30) * 100, 100);
  document.getElementById('accelFill').style.width = pct + '%';
  document.getElementById('accelVal').textContent = latestMag.toFixed(2) + ' m/s²';
  if (maxAccelDirty) {
    maxAccelDirty = false;
    document.getElementById('statMax').textContent = maxAccel.toFixed(1);
  }
}

function onMotion(e) {
  lastMotionTime = Date.now();
  const a = e.acceleration || e.accelerationIncludingGravity;
  if (!a) return;

  const x = a.x || 0, y = a.y || 0, z = a.z || 0;
  const mag = Math.sqrt(x * x + y * y + z * z);
  latestMag = mag;

  if (running) {
    if (mag > maxAccel) {
      maxAccel = mag;
      maxAccelDirty = true;
    }
    const now = Date.now();
    if (mag >= threshold && now - lastTrigger > cooldown) {
      lastTrigger = now;
      count++;
      updateCountUI(true);
      document.getElementById('countSub').textContent = `最新峰值 ${mag.toFixed(1)} m/s²`;
    }
  }

  if (!rafPending) {
    rafPending = true;
    rafId = requestAnimationFrame(flushMotionUI);
  }
}

// ── 点击数字：硬恢复 + 归零 ────────────────────────────
// 息屏 / 后台回来后传感器流可能滞留旧帧，单独 resetCount 不够，
// 这里把所有易脏的中间状态一次清空，让点击屏幕「立刻回到干净起点」。
function tapCount() {
  // 1. 干掉任何还在排队的 rAF，避免下一帧用旧 latestMag 覆盖显示
  if (rafId) {
    cancelAnimationFrame(rafId);
    rafId = 0;
  }
  rafPending = false;
  latestMag = 0;
  maxAccelDirty = false;
  // 2. 清掉冷却时间戳，避免点击瞬间被「上一次触发」误锁
  lastTrigger = 0;
  // 3. 加速度条 / 数值立刻归零，不等下一个 motion 事件
  document.getElementById('accelFill').style.width = '0%';
  document.getElementById('accelVal').textContent = '0.00 m/s²';
  // 4. 计数归零（顺带清快算按钮）
  resetCount();
  // 5. 重新订阅传感器流：未运行则启动，运行中则强制重订阅把卡住的事件流踢活
  if (!running) {
    startListening();
  } else {
    resubscribeMotion();
  }
}

// ── 屏幕保持唤醒 ─────────────────────────────────
// 多管齐下尝试阻止 watchOS / iOS 自动锁屏：
//   1. Screen Wake Lock API（标准方案，watchOS 实测无效，但 iOS Safari 有效）
//   2. AudioContext 静音振荡器（让页面进入"媒体活动"状态）
//   3. MediaSession 标记"正在播放"（强化媒体活动信号）
// 三个都得在 user gesture 之后调用，点击大数字进入 startListening 时刚好满足。
// 全部 try/catch 包住，任一不支持都静默忽略，不影响计数主流程。
let wakeLock = null;
async function acquireWakeLock() {
  if (!('wakeLock' in navigator)) return;
  if (wakeLock) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch (e) { /* 静默 */ }
}

let audioCtx = null;
function startSilentAudio() {
  if (audioCtx) return;
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    // iOS WebKit 经常初始化时是 suspended，需要 resume
    if (audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
    const gain = audioCtx.createGain();
    gain.gain.value = 0.0001; // 几乎零增益，实际无声
    const osc = audioCtx.createOscillator();
    osc.frequency.value = 1; // 1Hz 次声波，扬声器也发不出
    osc.connect(gain).connect(audioCtx.destination);
    osc.start();
  } catch (e) { /* 静默 */ }
}

function announceMediaActive() {
  if (!('mediaSession' in navigator)) return;
  try {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: '振动计数器',
      artist: 'Detecting'
    });
    navigator.mediaSession.playbackState = 'playing';
  } catch (e) { /* 静默 */ }
}

// NoSleep.js 实例（依赖外部脚本是否加载成功）
let noSleep = null;
function enableNoSleep() {
  try {
    if (!noSleep && typeof NoSleep !== 'undefined') {
      noSleep = new NoSleep();
    }
    if (noSleep) {
      const p = noSleep.enable();
      if (p && p.catch) p.catch(() => {});
    }
  } catch (e) { /* 静默 */ }
}

function keepScreenAwake() {
  acquireWakeLock();
  startSilentAudio();
  announceMediaActive();
  enableNoSleep();
}

// ── 启动 / 停止 ───────────────────────────────────
// iOS Safari / Android Chrome 在省电 / 后台 / 无交互时会静默掐掉 devicemotion 事件流，
// 手动 stop→start 能恢复的本质就是重新订阅。用心跳 watchdog 自动做这件事。
function resubscribeMotion() {
  window.removeEventListener('devicemotion', onMotion);
  window.addEventListener('devicemotion', onMotion);
  lastMotionTime = Date.now(); // 给宽限期
}

function startListening() {
  window.addEventListener('devicemotion', onMotion);
  running = true;
  startTime = Date.now();
  lastMotionTime = Date.now();
  setStatus(true);
  keepScreenAwake(); // wake lock + 静音 audio + mediasession 多管齐下阻止熄屏
  timerInterval = setInterval(updateTimer, 500);
  // 每秒检查事件流是否被挂起；卡住就悄悄重订阅
  stallWatchInterval = setInterval(() => {
    if (!running) return;
    if (Date.now() - lastMotionTime > STALL_MS) {
      resubscribeMotion();
    }
  }, 1000);
}


// ── iOS 权限 ──────────────────────────────────────
function requestPerm() {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission().then(state => {
      if (state === 'granted') {
        document.getElementById('permBox').classList.remove('show');
      } else {
        alert('传感器权限被拒绝，无法检测振动。');
      }
    }).catch(err => alert('权限请求失败：' + err));
  }
}

// ── 初始化 ────────────────────────────────────────
(function init() {
  // 设置初始 threshold 显示
  onSensChange(10);
  onCoolChange(190);

  // 检测 iOS 需要权限
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    document.getElementById('permBox').classList.add('show');
  }

  // 非 HTTPS / 无传感器环境提示
  if (window.isSecureContext === false) {
    document.getElementById('countSub').textContent = '⚠ 需在 HTTPS 页面才能访问传感器';
  }

  // 页面从后台/息屏回到前台：iOS 会挂起事件流，立即重订阅，
  // 首次 resubscribe 有时还拿不到事件，500ms 后兜底再试一次
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && running) {
      resubscribeMotion();
      keepScreenAwake(); // 切回前台时各种保活状态都已被系统释放，重新申请
      setTimeout(() => {
        if (running && Date.now() - lastMotionTime > 400) {
          resubscribeMotion();
        }
      }, 500);
    }
  });

  // BFCache 恢复（iOS 切换 tab / 返回等走 pageshow 而不是 visibilitychange）
  window.addEventListener('pageshow', () => {
    if (running) resubscribeMotion();
  });

  // 任意触摸即踢活：只要事件流停超 1s，就当是卡住并强制重订阅
  // 这样用户感觉页面没反应时随便点一下屏幕就能恢复，不必等 watchdog
  document.addEventListener('touchstart', () => {
    if (running && Date.now() - lastMotionTime > 1000) {
      resubscribeMotion();
    }
  }, { passive: true });
})();
</script>
